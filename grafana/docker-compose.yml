services:
  grafana:
    image: grafana/grafana:latest
    container_name: crispy_grafana
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource,volkovlabs-form-panel
      - GF_AUTH_ANONYMOUS_ENABLED=true # LAN-only, no login needed
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ../crispy_sleep.db:/data/crispy_sleep.db:ro # mount DB read-only

volumes:
  grafana_data:
  
